name: Build & publish obs-mock

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'obs-mock/src/**'
      - 'obs-mock/Cargo.toml'
      - 'obs-mock/Cargo.lock'
      - 'Dockerfiles.d/obs-mock/**'
      - '.github/workflows/obs-mock.build.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'obs-mock/src/**'
      - 'obs-mock/Cargo.toml'
      - 'obs-mock/Cargo.lock'
      - 'Dockerfiles.d/obs-mock/**'
      - '.github/workflows/obs-mock.build.yaml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  image:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- Build and push ---
      - name: Set short Git SHA
        id: git
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push obs-mock image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfiles.d/obs-mock/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            GIT_SHA=${{ steps.git.outputs.short_sha }}
          tags: |
            ghcr.io/${{ github.repository }}/obs-mock:latest
            ghcr.io/${{ github.repository }}/obs-mock:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: |
          echo "Image pushed with digest: ${{ steps.build.outputs.digest }}"
