name: Build & publish obs-mock

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'obs-mock/src/**'
      - 'obs-mock/Cargo.toml'
      - 'obs-mock/Cargo.lock'
      - 'Dockerfiles.d/obs-mock/**'
      - '.github/workflows/obs-mock.build.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'obs-mock/src/**'
      - 'obs-mock/Cargo.toml'
      - 'obs-mock/Cargo.lock'
      - 'Dockerfiles.d/obs-mock/**'
      - '.github/workflows/obs-mock.build.yaml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  binary:
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            artifact: obs-mock-linux-amd64
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            artifact: obs-mock-linux-arm64
          - target: x86_64-apple-darwin
            runner: macos-latest
            artifact: obs-mock-darwin-amd64
          - target: aarch64-apple-darwin
            runner: macos-latest
            artifact: obs-mock-darwin-arm64
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            artifact: obs-mock-windows-amd64
          - target: aarch64-pc-windows-msvc
            runner: windows-latest
            artifact: obs-mock-windows-arm64

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        working-directory: obs-mock
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: obs-mock/target/${{ matrix.target }}/release/obs-mock

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: obs-mock/target/${{ matrix.target }}/release/obs-mock.exe

  release:
    needs: binary
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in artifacts/obs-mock-*; do
            name=$(basename "$dir")
            if ls "$dir"/*.exe 1>/dev/null 2>&1; then
              cp "$dir/obs-mock.exe" "release/${name}.exe"
            else
              cp "$dir/obs-mock" "release/${name}"
              chmod +x "release/${name}"
            fi
          done
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*

  image:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- Build and push ---
      - name: Set short Git SHA
        id: git
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push obs-mock image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfiles.d/obs-mock/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            GIT_SHA=${{ steps.git.outputs.short_sha }}
          tags: |
            ghcr.io/${{ github.repository }}/obs-mock:latest
            ghcr.io/${{ github.repository }}/obs-mock:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: |
          echo "Image pushed with digest: ${{ steps.build.outputs.digest }}"
